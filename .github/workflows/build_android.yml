# Build Android APK - Generated: 2026-03-15 15:40
name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # 1. Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Set up Java (required by Flutter/Android)
      - name: Set Up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Set up Flutter
      - name: Set Up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      # 3.5 Decode Keystore
      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > flutter_app/android/app/keystore.jks
          keytool -list -keystore flutter_app/android/app/keystore.jks -storepass android -storetype JKS

      # 3.6 Write key.properties
      - name: Write key.properties
        run: |
          echo "storeFile=keystore.jks" > flutter_app/android/key.properties
          echo "storePassword=android" >> flutter_app/android/key.properties
          echo "keyAlias=upload" >> flutter_app/android/key.properties
          echo "keyPassword=android" >> flutter_app/android/key.properties

      # 4. Install dependencies
      - name: Install Flutter Dependencies
        working-directory: ./flutter_app
        run: flutter pub get

      # 5. Build release APK
      - name: Build Release APK
        working-directory: ./flutter_app
        run: flutter build apk --release

      # 6. Rename APK with version tag
      - name: Rename APK
        id: rename_apk
        run: |
          VERSION=$(grep '^version:' flutter_app/pubspec.yaml | awk '{print $2}' | tr -d '\r')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          cp flutter_app/build/app/outputs/flutter-apk/app-release.apk "bidwave-v$VERSION.apk"

      # 7. Create GitHub Release and upload APK
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.rename_apk.outputs.version }}"
          name: "BZ BidWave v${{ steps.rename_apk.outputs.version }}"
          body: |
            ## BZ BidWave Android App — v${{ steps.rename_apk.outputs.version }}
            🇧🇿 Belize's First Open Bidding Platform

            ### What's New
            - Real-time bidding via Convex subscriptions
            - Photo uploads for listings
            - Auth integration
            - Performance improvements

            ### Install
            Download the APK below. Enable "Install from Unknown Sources" in Android Settings before installing.
          draft: false
          prerelease: false
          files: "bidwave-v${{ steps.rename_apk.outputs.version }}.apk"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
