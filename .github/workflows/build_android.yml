# Build Android APK - Generated: 2026-03-15 15:40
name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Debug APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # 1. Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Set up Java (required by Flutter/Android)
      - name: Set Up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Set up Flutter
      - name: Set Up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'
          cache: true

      - name: Flutter Clean
        run: flutter clean
        working-directory: ./flutter_app

      # 4. Install dependencies
      - name: Install Flutter Dependencies
        working-directory: ./flutter_app
        run: flutter pub get

      # 5. Install Rust (required for convex_flutter native build)
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      # 6. Build debug APK
      - name: Build Debug APK
        working-directory: ./flutter_app
        run: flutter build apk --debug

      # 7. Rename APK with version tag
      - name: Rename APK
        id: rename_apk
        run: |
          VERSION=$(grep '^version:' flutter_app/pubspec.yaml | awk '{print $2}' | tr -d '\r')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          # Use the debug APK for CI-based builds
          cp flutter_app/build/app/outputs/flutter-apk/app-debug.apk "bidwave-v$VERSION-debug.apk"

      # 8. Create GitHub Release and upload APK
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.rename_apk.outputs.version }}"
          name: "BZ BidWave v${{ steps.rename_apk.outputs.version }} (Debug)"
          body: |
            ## BZ BidWave Android App — v${{ steps.rename_apk.outputs.version }}
            🇧🇿 Belize's First Open Bidding Platform

            ### What's New
            - Real-time bidding via Convex subscriptions
            - Photo uploads for listings
            - Auth integration
            - Performance improvements

            ### Install
            Download the APK below. Enable "Install from Unknown Sources" in Android Settings before installing.
          draft: false
          prerelease: false
          files: "bidwave-v${{ steps.rename_apk.outputs.version }}-debug.apk"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
