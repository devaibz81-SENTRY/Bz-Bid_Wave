<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Room - BidWave</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        .font-syne { font-family: 'Syne', sans-serif; }
        .glass-panel { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); }
        .gold-text { color: #f59e0b; }
        .btn-gold { background: #f59e0b; color: #000; font-weight: 800; padding: 12px 24px; border-radius: 8px; }
        .btn-gold:hover { filter: brightness(1.1); }
        .bg-marble { background-color: #09090b; background-image: radial-gradient(circle at 20% 30%, rgba(139, 92, 246, 0.05) 0%, transparent 50%), radial-gradient(circle at 80% 70%, rgba(245, 158, 11, 0.05) 0%, transparent 50%), url("https://www.transparenttextures.com/patterns/carbon-fibre.png"); background-attachment: fixed; }
        .chat-message { max-width: 80%; }
        .chat-own { margin-left: auto; background: rgba(245, 158, 11, 0.2); border-color: rgba(245, 158, 11, 0.3); }
        .chat-other { margin-right: auto; background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.1); }
    </style>
</head>
<body class="antialiased bg-marble text-white min-h-screen">
    <script src="/js/auth.js"></script>
    <script>
        if (!isLoggedIn()) {
            window.location.href = '/login.html';
        }
    </script>

    <!-- Navigation -->
    <nav class="fixed top-0 left-0 right-0 z-50 glass-panel py-3">
        <div class="max-w-6xl mx-auto flex items-center justify-between px-6">
            <a href="/dashboard.html" class="font-syne text-xl font-black flex items-center gap-2">
                BID<span class="gold-text">WAVE</span> 🇧🇿
            </a>
            <div class="flex items-center gap-4">
                <a href="/dashboard.html" class="text-sm text-slate-400 hover:text-white">Dashboard</a>
                <a href="/chat.html" class="text-sm font-bold gold-text">Chat</a>
                <a href="/profile.html" class="w-8 h-8 rounded-full bg-yellow-500/20 border border-yellow-500/30 flex items-center justify-center text-yellow-500 font-bold text-xs user-avatar">BZ</a>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-6 pt-24 pb-6">
        <div class="grid lg:grid-cols-4 gap-6 h-[calc(100vh-140px)]">
            <!-- Chat Rooms Sidebar -->
            <div class="lg:col-span-1 glass-panel rounded-xl overflow-hidden">
                <div class="p-4 border-b border-white/10">
                    <h2 class="font-syne font-black uppercase text-lg">Chat Rooms</h2>
                </div>
                <div class="p-2">
                    <button onclick="switchRoom('global')" class="room-btn w-full text-left p-3 rounded-lg mb-1 bg-yellow-500/20 border border-yellow-500/30">
                        <div class="font-bold text-sm">🌍 Global Chat</div>
                        <div class="text-xs text-slate-400">All bidders welcome</div>
                    </button>
                    <button onclick="switchRoom('deals')" class="room-btn w-full text-left p-3 rounded-lg mb-1 hover:bg-white/5">
                        <div class="font-bold text-sm">💰 Deals & Bids</div>
                        <div class="text-xs text-slate-400">Hot bids chat</div>
                    </button>
                    <button onclick="switchRoom('help')" class="room-btn w-full text-left p-3 rounded-lg mb-1 hover:bg-white/5">
                        <div class="font-bold text-sm">❓ Help & Support</div>
                        <div class="text-xs text-slate-400">Questions answered</div>
                    </button>
                </div>
                
                <div class="p-4 border-t border-white/10 mt-auto">
                    <div class="text-xs text-slate-500 uppercase font-bold mb-2">Active Users</div>
                    <div id="activeUsers" class="text-sm text-slate-400">Loading...</div>
                </div>
            </div>

            <!-- Chat Area -->
            <div class="lg:col-span-3 glass-panel rounded-xl flex flex-col overflow-hidden">
                <!-- Room Header -->
                <div class="p-4 border-b border-white/10 flex justify-between items-center">
                    <div>
                        <h3 id="roomTitle" class="font-syne font-black">🌍 Global Chat</h3>
                        <div id="roomDesc" class="text-sm text-slate-400">Chat with other Belize bidders</div>
                    </div>
                    <button onclick="clearChat()" class="text-xs text-slate-500 hover:text-white">Clear Chat</button>
                </div>

                <!-- Messages -->
                <div id="chatMessages" class="flex-1 overflow-y-auto p-4 space-y-4">
                    <!-- Messages populated by JS -->
                </div>

                <!-- Input -->
                <div class="p-4 border-t border-white/10">
                    <form id="chatForm" class="flex gap-3">
                        <input id="chatInput" type="text" class="flex-1 bg-black/30 border border-white/10 rounded-lg px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-yellow-500" placeholder="Type a message..." autocomplete="off" />
                        <button type="submit" class="btn-gold px-6">Send</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script>
        const CHAT_KEY = 'bz_chat_messages';
        let currentRoom = 'global';

        const rooms = {
            global: { title: '🌍 Global Chat', desc: 'Chat with all Belize bidders' },
            deals: { title: '💰 Deals & Bids', desc: 'Discuss hot auctions' },
            help: { title: '❓ Help & Support', desc: 'Get your questions answered' }
        };

        function getUser() {
            return JSON.parse(localStorage.getItem('bz_user') || '{}');
        }

        function getMessages() {
            const data = localStorage.getItem(CHAT_KEY);
            return data ? JSON.parse(data) : {};
        }

        function saveMessages(messages) {
            localStorage.setItem(CHAT_KEY, JSON.stringify(messages));
        }

        function getChatMessages() {
            const messages = getMessages();
            return messages[currentRoom] || [];
        }

        function addMessage(text) {
            const user = getUser();
            const messages = getMessages();
            
            if (!messages[currentRoom]) messages[currentRoom] = [];
            
            const newMessage = {
                id: Date.now(),
                user: user.displayName || 'Anonymous',
                text: text.trim(),
                time: Date.now(),
                room: currentRoom
            };
            
            messages[currentRoom].push(newMessage);
            
            // Keep last 100 messages per room
            if (messages[currentRoom].length > 100) {
                messages[currentRoom] = messages[currentRoom].slice(-100);
            }
            
            saveMessages(messages);
            renderMessages();
        }

        function formatTime(timestamp) {
            const date = new Date(timestamp);
            return date.toLocaleTimeString('en-BZ', { hour: '2-digit', minute: '2-digit' });
        }

        function renderMessages() {
            const container = document.getElementById('chatMessages');
            const messages = getChatMessages();
            const user = getUser();
            
            if (messages.length === 0) {
                container.innerHTML = `
                    <div class="text-center text-slate-500 py-8">
                        <div class="text-4xl mb-2">💬</div>
                        <div>No messages yet. Start the conversation!</div>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = messages.map(msg => {
                const isOwn = msg.user === (user.displayName || 'Anonymous');
                return `
                    <div class="chat-message chat-${isOwn ? 'own' : 'other'} p-3 rounded-lg border">
                        <div class="flex justify-between items-center mb-1">
                            <span class="font-bold text-sm ${isOwn ? 'text-yellow-500' : 'text-yellow-400'}">${msg.user}</span>
                            <span class="text-xs text-slate-500">${formatTime(msg.time)}</span>
                        </div>
                        <div class="text-sm">${escapeHtml(msg.text)}</div>
                    </div>
                `;
            }).join('');
            
            container.scrollTop = container.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function switchRoom(room) {
            currentRoom = room;
            document.getElementById('roomTitle').textContent = rooms[room].title;
            document.getElementById('roomDesc').textContent = rooms[room].desc;
            
            document.querySelectorAll('.room-btn').forEach(btn => {
                btn.classList.remove('bg-yellow-500/20', 'border-yellow-500/30');
                btn.classList.add('hover:bg-white/5');
            });
            event.target.closest('.room-btn').classList.add('bg-yellow-500/20', 'border-yellow-500/30');
            event.target.closest('.room-btn').classList.remove('hover:bg-white/5');
            
            renderMessages();
        }

        function clearChat() {
            if (confirm('Clear all messages in this chat room?')) {
                const messages = getMessages();
                messages[currentRoom] = [];
                saveMessages(messages);
                renderMessages();
            }
        }

        function updateActiveUsers() {
            const messages = getMessages();
            const allUsers = new Set();
            Object.values(messages).flat().forEach(m => allUsers.add(m.user));
            document.getElementById('activeUsers').textContent = allUsers.size > 0 ? Array.from(allUsers).slice(0, 5).join(', ') + (allUsers.size > 5 ? '...' : '') : 'Be the first to chat!';
        }

        // Send message
        document.getElementById('chatForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (text) {
                addMessage(text);
                input.value = '';
            }
        });

        // Load
        document.addEventListener('DOMContentLoaded', function() {
            renderMessages();
            updateActiveUsers();
            // Refresh messages every 10 seconds
            setInterval(() => {
                renderMessages();
                updateActiveUsers();
            }, 10000);
        });
    </script>
</body>
</html>
