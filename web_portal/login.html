<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In - BidWave</title>
  <style>
    body { margin: 0; font-family: Inter, system-ui, -apple-system; background: #0a0a0f; color: #fff; }
    .container { max-width: 400px; margin: 80px auto; padding: 20px; }
    .card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 24px; }
    h1 { font-family: 'Syne', sans-serif; font-size: 28px; margin: 0 0 8px; }
    label { display: block; font-size: 12px; color: #9ca3af; margin-top: 12px; }
    input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #374151; background: rgba(0,0,0,0.3); color: #fff; box-sizing: border-box; }
    button { width: 100%; margin-top: 16px; padding: 12px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; }
    .btn-primary { background: #f59e0b; color: #000; }
    .btn-secondary { background: transparent; color: #9ca3af; margin-top: 8px; }
    .error { color: #ef4444; font-size: 12px; margin-top: 8px; }
  </style>
</head>
<body>
  <script src="/js/auth.js"></script>
  <script>
    if (isLoggedIn()) {
      window.location.href = '/dashboard.html';
    }
  </script>
  <header class="card" style="border-radius: 0; position: sticky; top: 0;">
    <nav style="display:flex; justify-content: space-between; align-items: center;">
      <a href="/" style="font-family: 'Syne', sans-serif; font-weight: 900; text-decoration: none; color: #fff; font-size: 20px;">BID<span style="color:#f59e0b;">WAVE</span> 🇧🇿</a>
      <a href="/index.html" style="color: #9ca3af; text-decoration: none; font-size: 14px;">← Back</a>
    </nav>
  </header>

  <main class="container">
    <div class="card">
      <h1>Log In</h1>
      <p style="color: #9ca3af; font-size: 14px; margin-bottom: 20px;">Enter your username and 4-digit PIN to sign in.</p>
      
      <form id="loginForm">
        <label for="username">Username</label>
        <input id="username" type="text" placeholder="e.g. BZ_Bidder_01" required />
        
        <label for="pin">4-Digit PIN</label>
        <input id="pin" type="password" placeholder="4-digit PIN" pattern="\d{4}" required />
        
        <button type="submit" class="btn-primary">Log In</button>
        <button type="button" class="btn-secondary" onclick="location.href='/onboarding.html'">Create Account</button>
        <div id="error" class="error"></div>
      </form>
    </div>
  </main>

  <script>
    const form = document.getElementById('loginForm');
    const errorDiv = document.getElementById('error');
    
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const pin = document.getElementById('pin').value.trim();
      
      // Simple local auth for MVP
      const stored = JSON.parse(localStorage.getItem('bz_user') || '{}');
      
      if (stored && stored.displayName === username && stored.pin === pin) {
        localStorage.setItem('bz_session', JSON.stringify({ displayName: username, loggedIn: true }));
        location.href = '/dashboard.html';
      } else {
        errorDiv.textContent = 'Invalid username or PIN. Please create an account if you don\'t have one.';
      }
    });
  </script>
</body>
</html>
